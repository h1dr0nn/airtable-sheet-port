name: Build and Release

# Tag scheme:
#   develop-v<x.y.z>  -> prerelease build
#   release-v<x.y.z>  -> stable release
# The <x.y.z> suffix is injected into apps/desktop/package.json and
# apps/desktop/src-tauri/tauri.conf.json before building. The create-release job
# regenerates the root updater.json (the endpoint tauri.conf.json points at) with
# the freshly signed bundle URLs + signatures and commits it back to main.

on:
  push:
    tags:
      - "develop-v*"
      - "release-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows - x64
          - os: windows-latest
            platform: windows
            arch: x64
            target: x86_64-pc-windows-msvc
          # Linux - x64
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
          # macOS - Intel (x64)
          - os: macos-15-intel
            platform: macos
            arch: x64
            target: x86_64-apple-darwin
          # macOS - Apple Silicon (arm64)
          - os: macos-latest
            platform: macos
            arch: arm64
            target: aarch64-apple-darwin

    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Version from Tag
        id: get_version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/release-v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/release-v}
          elif [[ $GITHUB_REF == refs/tags/develop-v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/develop-v}
          else
            VERSION="0.0.0"
          fi
          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update Configuration Files
        shell: bash
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          # The Tauri app lives at apps/desktop (monorepo), not the repo root.
          PKG="apps/desktop/package.json"
          CONF="apps/desktop/src-tauri/tauri.conf.json"
          if command -v jq &> /dev/null; then
            jq --arg v "$VERSION" '.version = $v' "$PKG" > "$PKG.tmp" && mv "$PKG.tmp" "$PKG"
            jq --arg v "$VERSION" '.version = $v' "$CONF" > "$CONF.tmp" && mv "$CONF.tmp" "$CONF"
          else
            node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('$PKG')); p.version='$VERSION'; fs.writeFileSync('$PKG', JSON.stringify(p, null, 2));"
            node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('$CONF')); p.version='$VERSION'; fs.writeFileSync('$CONF', JSON.stringify(p, null, 2));"
          fi
          echo "Updated versions to: $VERSION"
          grep version "$PKG" || true
          grep version "$CONF" || true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # No explicit version: pnpm is pinned by the packageManager field in
          # package.json (pnpm@9.15.4). Setting both here trips
          # ERR_PNPM_BAD_PM_VERSION on the runner.
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          # Cargo workspace is rooted at the repo root, not apps/desktop/src-tauri.
          workspaces: .
          cache-on-failure: true

      - name: Install Dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install Frontend Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Workspace Packages
        # tauri's beforeBuildCommand runs the desktop `tsc -p`, which references
        # @sheet-port/shared and @sheet-port/ui but does not build them, so a
        # clean checkout has no dist and hits TS6305. Build every workspace
        # package (topological order) first so the referenced dist exists.
        run: pnpm -r build

      - name: Prepare Signing Key
        shell: bash
        run: |
          if [ -z "$RAW_KEY" ]; then
            echo "::error:: TAURI_SIGNING_PRIVATE_KEY is empty. Please check the 'Repository secrets'."
            exit 1
          fi

          # Strip the "untrusted comment:" line (minisign header) and all
          # whitespace so only the base64 key body is exported.
          BASE64_KEY=$(echo "$RAW_KEY" | grep -v "^untrusted comment:" | tr -d '[:space:]')

          echo "Base64 key length: ${#BASE64_KEY} characters"

          if [ -z "$BASE64_KEY" ]; then
            echo "::error:: Could not extract base64 key from TAURI_SIGNING_PRIVATE_KEY."
            exit 1
          fi

          echo "TAURI_SIGNING_PRIVATE_KEY=$BASE64_KEY" >> $GITHUB_ENV
          echo "Signing key prepared successfully."
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri App
        # --filter targets the desktop workspace package; the Rust build shares the
        # root target/ directory across the whole Cargo workspace.
        run: pnpm --filter @sheet-port/desktop tauri:build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Rename and Prepare Artifacts
        shell: bash
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p release-artifacts
          # Workspace bundle output is at the repo-root target dir.
          BUNDLE="target/${TARGET}/release/bundle"
          APP_SLUG="airtable-sheet-port"
          PREFIX="${APP_SLUG}-${VERSION}-${PLATFORM}-${ARCH}"

          echo "=== Bundle tree ==="
          ls -R "$BUNDLE" || true
          echo ""
          echo "=== Updater bundles (.sig pairs) found ==="
          find "$BUNDLE" -name "*.sig" -print || true
          echo ""

          if [ "$PLATFORM" = "windows" ]; then
            # NSIS — the -setup.exe is both the installer and the updater bundle.
            EXE=$(find "$BUNDLE/nsis" -name "*-setup.exe" -not -name "*.sig" | head -n 1)
            SIG=$(find "$BUNDLE/nsis" -name "*-setup.exe.sig" | head -n 1)
            [ -n "$EXE" ] && cp "$EXE" "release-artifacts/${PREFIX}-setup.exe"
            [ -n "$SIG" ] && cp "$SIG" "release-artifacts/${PREFIX}-setup.exe.sig"
            # MSI — secondary installer, no updater wiring.
            cp "$BUNDLE"/msi/*.msi "release-artifacts/${PREFIX}.msi" 2>/dev/null || true
            if [ -z "$EXE" ] || [ -z "$SIG" ]; then
              echo "::error::Windows NSIS bundle missing — exe='$EXE' sig='$SIG'."
              exit 1
            fi
          elif [ "$PLATFORM" = "linux" ]; then
            # AppImage — both the installer and the updater bundle.
            APP=$(find "$BUNDLE/appimage" -name "*.AppImage" -not -name "*.sig" | head -n 1)
            SIG=$(find "$BUNDLE/appimage" -name "*.AppImage.sig" | head -n 1)
            [ -n "$APP" ] && cp "$APP" "release-artifacts/${PREFIX}.AppImage"
            [ -n "$SIG" ] && cp "$SIG" "release-artifacts/${PREFIX}.AppImage.sig"
            chmod +x "release-artifacts/${PREFIX}.AppImage" 2>/dev/null || true
            cp "$BUNDLE"/deb/*.deb "release-artifacts/${PREFIX}.deb" 2>/dev/null || true
            if [ -z "$APP" ] || [ -z "$SIG" ]; then
              echo "::error::Linux AppImage bundle missing — app='$APP' sig='$SIG'."
              exit 1
            fi
          elif [ "$PLATFORM" = "macos" ]; then
            # macOS — DMG for download, .app.tar.gz for the updater bundle.
            cp "$BUNDLE"/dmg/*.dmg "release-artifacts/${PREFIX}.dmg" 2>/dev/null || true
            APP=$(find "$BUNDLE" -name "*.app.tar.gz" -not -name "*.sig" | head -n 1)
            SIG=$(find "$BUNDLE" -name "*.app.tar.gz.sig" | head -n 1)
            [ -n "$APP" ] && cp "$APP" "release-artifacts/${PREFIX}-updater.app.tar.gz"
            [ -n "$SIG" ] && cp "$SIG" "release-artifacts/${PREFIX}-updater.app.tar.gz.sig"
            if [ -z "$APP" ] || [ -z "$SIG" ]; then
              echo "::error::macOS updater bundle missing — app='$APP' sig='$SIG'."
              exit 1
            fi
          fi

          echo "=== Final artifacts ==="
          ls -la release-artifacts/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-artifacts/*
          retention-days: 7
          if-no-files-found: warn

  create-release:
    name: Create Release & Update Manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version from Tag
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/release-v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/release-v}
          elif [[ $GITHUB_REF == refs/tags/develop-v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/develop-v}
          else
            VERSION="0.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: Update updater.json
        shell: bash
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          node << 'EOF'
          const fs = require("fs");
          const path = require("path");

          const version = process.env.VERSION;
          const tag = process.env.TAG_NAME;
          const repo = process.env.GITHUB_REPOSITORY;
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;

          const updater = JSON.parse(fs.readFileSync("updater.json", "utf8"));
          updater.version = version;
          updater.pub_date = new Date().toISOString();

          // Map our artifact naming -> tauri's platform keys. Each installer type
          // gets both the type-suffixed key (windows-x86_64-nsis) and the bare
          // arch key (windows-x86_64) so either resolves the same bundle.
          const platforms = {
            "windows-x86_64": {
              ext: "windows-x64-setup.exe",
              keys: ["windows-x86_64-nsis", "windows-x86_64"],
            },
            "linux-x86_64": {
              ext: "linux-x64.AppImage",
              keys: ["linux-x86_64-appimage", "linux-x86_64"],
            },
            "darwin-x86_64": {
              ext: "macos-x64-updater.app.tar.gz",
              keys: ["darwin-x86_64"],
            },
            "darwin-aarch64": {
              ext: "macos-arm64-updater.app.tar.gz",
              keys: ["darwin-aarch64"],
            },
          };

          // Rebuild platforms from scratch to clear any stale values.
          updater.platforms = {};
          const files = fs.readdirSync("artifacts");
          for (const [name, { ext, keys }] of Object.entries(platforms)) {
            const bundle = files.find((f) => f.endsWith(ext));
            const sig = bundle && files.find((f) => f === `${bundle}.sig`);
            if (!bundle) {
              console.warn(`! Missing bundle for ${name} (looking for *${ext})`);
              continue;
            }
            const sigContent = sig
              ? fs.readFileSync(path.join("artifacts", sig), "utf8").trim()
              : "";
            const entry = {
              url: `${baseUrl}/${bundle}`,
              signature: sigContent,
            };
            for (const k of keys) {
              updater.platforms[k] = entry;
            }
            console.log(
              `OK ${name} (${keys.join(", ")}) -> ${bundle}${sig ? "" : "  (no sig!)"}`,
            );
          }

          fs.writeFileSync("updater.json", JSON.stringify(updater, null, 2));
          console.log("\nUpdated updater.json:");
          console.log(fs.readFileSync("updater.json", "utf8"));
          EOF

      - name: Commit and Push updater.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add updater.json

          if git diff --staged --quiet; then
            echo "No changes in updater.json to commit."
            exit 0
          fi

          git commit -m "chore: update updater.json for version ${{ steps.get_version.outputs.version }} [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      - name: Prepare Release Files
        run: |
          mkdir -p release-files
          # Upload installers + updater bundles. Skip .sig files — those are
          # already embedded in updater.json and need no public URL.
          find artifacts -type f ! -name "*.sig" -exec cp {} release-files/ \;
          echo "Files to be uploaded to release:"
          ls -la release-files/

      - name: Determine Release Type
        id: release_type
        run: |
          if [[ "${{ github.ref }}" == refs/tags/release-v* ]]; then
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_name=Airtable - Sheet Port ${{ steps.get_version.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "release_name=Development Build ${{ steps.get_version.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_type.outputs.release_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ steps.release_type.outputs.is_prerelease }}
          files: release-files/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
